server {
    server_name passport.dongyuhan.com;

    # Static proxy for avatars. If the directory is managed by a symlink,
    # update the alias to point to the corresponding symlink path.
    # E.g., your GitHub Action can run: ln -sf /passport/avatars /some/nginx/accessible/path/avatars
    location /avatars/ {
        alias /passport/avatars/;
        autoindex off;
        # Prevent CORS issues (if needed)
        # add_header Access-Control-Allow-Origin *;
    }

    location / {
        proxy_pass http://localhost:8089;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/passport.dongyuhan.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/passport.dongyuhan.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = passport.dongyuhan.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name passport.dongyuhan.com;
    return 404; # managed by Certbot
}
